<!DOCTYPE html>
<html>
<head>
    <title>Git Backup Tool</title>
    <style>
         body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: #e0e0e0;
    text-align: center;
}

.container {
    margin-top: 80px;
}

.card {
    background: #2b2b3c; /* dark card */
    color: #ffffff;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    margin: auto;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
}


h1 {
    margin-bottom: 30px;
    color: #ffffff;
}

.btn {
    display: block;
    margin: 15px 0;
    padding: 12px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #43e97b, #38f9d7);
}

input {
    padding: 10px;
    width: 90%;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    background: #1f1f2e;
    color: white;
}

input::placeholder {
    color: #aaa;
}

button {
    margin-top: 12px;
    padding: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

    </style>
</head>

<body>

<div class="container">
    <h1>🚀 Git Backup Dashboard</h1>

    <div class="card">
        <a href="/backup" class="btn">🔄 Backup Now</a>
        <a href="/history" class="btn">📜 View History</a>

        <h3>Restore</h3>
        <form action="/restore" method="post">
            <input type="text" name="commit" placeholder="Enter commit ID">
            <button type="submit">Restore</button>
        </form>
    </div>
</div>

</body>
</html>
